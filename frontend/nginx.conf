server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-Frame-Options           "SAMEORIGIN"             always;
    add_header X-XSS-Protection          "1; mode=block"          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check endpoint (for Docker)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # React SPA — all routes served from index.html
    location / {
        try_files $uri $uri/ /index.html;
        # Don't cache index.html (so new deployments load immediately)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Disable nginx version in error pages
    server_tokens off;
}
