version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tresk_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tresk_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tresk_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password123@db:5432/tresk_ai
      - JWT_SECRET=production_super_secret_ai_interview_token
      - ALLOW_DEMO_AUTH=false
      - CORS_ORIGIN=http://localhost:5173
      - OPENROUTER_API_KEY=your_openrouter_api_key
      - GEMINI_API_KEY=your_gemini_api_key
      - RAZORPAY_KEY_ID=your_razorpay_key_id
      - RAZORPAY_KEY_SECRET=your_razorpay_key_secret
    depends_on:
      - db

volumes:
  pgdata:
