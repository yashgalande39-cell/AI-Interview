name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Checks ───────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true  # Report but don't fail on advisories

      - name: Check for vm2 (should not be present)
        run: |
          if grep -r "vm2" src/ --include="*.js"; then
            echo "❌ vm2 found in source! This is a security risk."
            exit 1
          fi
          echo "✅ vm2 not found in source."

  # ── Frontend Checks ──────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Report lint warnings

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: https://api.tresk.ai

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker-backend:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false  # Set to true when registry is configured
          tags: tresk-ai-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Production (main branch only) ───────────────────────────────────
