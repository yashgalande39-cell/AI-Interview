name: TRESK AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

# Cancel redundant runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# =============================================================================
# JOB 1: Backend Lint, Security Audit & Unit Tests
# =============================================================================
jobs:
  backend-checks:
    name: 🔍 Backend — Lint, Audit & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Security Audit (high severity only)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Scan for known vulnerable packages
        run: |
          echo "🔍 Checking for banned packages..."
          BANNED_PACKAGES=("vm2" "eval" "node-serialize")
          for pkg in "${BANNED_PACKAGES[@]}"; do
            if grep -rw "$pkg" src/ --include="*.js" --quiet; then
              echo "❌ Banned package '$pkg' found in source!"
              exit 1
            fi
          done
          echo "✅ No banned packages found."

      - name: Lint (ESLint)
        run: |
          if [ -f ".eslintrc.js" ] || [ -f "eslint.config.js" ] || [ -f ".eslintrc.json" ]; then
            npx eslint src/ --ext .js --max-warnings=20
          else
            echo "ℹ️  No ESLint config found — skipping lint."
          fi
        continue-on-error: true

      - name: Run unit tests
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test -- --passWithNoTests
          else
            echo "ℹ️  No test script found — skipping unit tests."
          fi
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret_for_github_actions_only

      - name: Validate schema.sql syntax
        run: |
          if command -v psql &> /dev/null; then
            psql --set ON_ERROR_STOP=1 -c '\i src/config/schema.sql' || echo "⚠️  psql not available, skipping SQL validation."
          else
            echo "⚠️  psql not available — SQL syntax not validated in this runner."
          fi
        continue-on-error: true

  # =============================================================================
  # JOB 2: Frontend Lint & Build
  # =============================================================================
  frontend-checks:
    name: 🎨 Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type check (if TypeScript)
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          else
            echo "ℹ️  No tsconfig.json — skipping type check."
          fi
        continue-on-error: true

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: https://api.tresk.ai
          VITE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # =============================================================================
  # JOB 3: Docker Build & Push (main/develop branches only)
  # =============================================================================
  docker-backend:
    name: 🐳 Docker — Backend Image Build
    runs-on: ubuntu-latest
    needs: [backend-checks]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  docker-frontend:
    name: 🐳 Docker — Frontend Image Build
    runs-on: ubuntu-latest
    needs: [frontend-checks]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=https://api.tresk.ai
            VITE_ENV=production

  # =============================================================================
  # JOB 4: Multi-Agent Smoke Tests (against staging)
  # =============================================================================
  agent-smoke-tests:
    name: 🤖 Multi-Agent Pipeline Smoke Tests
    runs-on: ubuntu-latest
    needs: [backend-checks]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: backend

      - name: Smoke test — Agent module imports
        working-directory: backend
        run: |
          node -e "
            const agents = require('./src/services/ai/agents');
            console.assert(typeof agents.InterviewAgent === 'object', 'InterviewAgent missing');
            console.assert(typeof agents.ResumeAgent === 'object', 'ResumeAgent missing');
            console.assert(typeof agents.CodingAgent === 'object', 'CodingAgent missing');
            console.assert(typeof agents.BehaviorAgent === 'object', 'BehaviorAgent missing');
            console.assert(typeof agents.ReportAgent === 'object', 'ReportAgent missing');
            console.assert(typeof agents.ReportAgent.computeConfidenceIndex === 'function', 'computeConfidenceIndex missing');
            console.assert(typeof agents.runInterviewEvaluation === 'function', 'runInterviewEvaluation missing');
            console.log('✅ All agent exports verified.');
          "
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret

      - name: Smoke test — ECI computation correctness
        working-directory: backend
        run: |
          node -e "
            const { ReportAgent } = require('./src/services/ai/agents');
            // Test with full context (should be high ECI)
            const high = ReportAgent.computeConfidenceIndex({ qaPairCount: 5, avgAnswerLength: 250, hasResume: true, scoreVariance: 50, agentsRan: 3, totalAgents: 3 });
            console.log('High ECI:', high);
            console.assert(high >= 0.80, 'High ECI should be >= 0.80, got: ' + high);
            // Test with minimal context (should be low ECI)
            const low = ReportAgent.computeConfidenceIndex({ qaPairCount: 1, avgAnswerLength: 20, hasResume: false, scoreVariance: 500, agentsRan: 1, totalAgents: 3 });
            console.log('Low ECI:', low);
            console.assert(low < 0.55, 'Low ECI should be < 0.55, got: ' + low);
            console.log('✅ ECI computation tests passed.');
          "
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret

      - name: Smoke test — RBAC middleware exports
        working-directory: backend
        run: |
          node -e "
            const rbac = require('./src/middleware/rbac.middleware');
            console.assert(typeof rbac.requireRole === 'function', 'requireRole missing');
            console.assert(typeof rbac.requireAdmin !== 'undefined', 'requireAdmin missing');
            console.assert(typeof rbac.requireTenantMatch === 'function', 'requireTenantMatch missing');
            console.assert(typeof rbac.auditLog === 'function', 'auditLog missing');
            console.log('✅ RBAC middleware exports verified.');
          "
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret

      - name: Smoke test — Notification service exports
        working-directory: backend
        run: |
          node -e "
            const notif = require('./src/services/ai/notification.service');
            console.assert(typeof notif.sendEmail === 'function', 'sendEmail missing');
            console.assert(typeof notif.sendInterviewCompletionEmail === 'function', 'sendInterviewCompletionEmail missing');
            console.assert(typeof notif.generateCalendarInvite === 'function', 'generateCalendarInvite missing');
            const ics = notif.generateCalendarInvite({ title: 'Test', startTime: new Date(), organizerEmail: 'a@b.com', attendeeEmail: 'c@d.com' });
            console.assert(ics.includes('BEGIN:VCALENDAR'), 'ICS output invalid');
            console.log('✅ Notification service exports verified.');
          "
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret
          EMAIL_PROVIDER: console
          APP_BASE_URL: http://localhost:5173

  # =============================================================================
  # JOB 5: Blue/Green Deploy to Production (main branch only)
  # =============================================================================
  deploy-production:
    name: 🚀 Deploy — Blue/Green Production
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, docker-backend, docker-frontend, agent-smoke-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject production secrets
        run: |
          echo "🔐 Injecting production environment secrets..."
          # Secrets are injected via GitHub Actions environment secrets
          # Configure these in: Settings → Environments → production → Secrets
          echo "JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}" >> $GITHUB_ENV
          echo "DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=${{ secrets.PROD_OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "S3_ACCESS_KEY_ID=${{ secrets.PROD_S3_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "S3_SECRET_ACCESS_KEY=${{ secrets.PROD_S3_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "RESEND_API_KEY=${{ secrets.PROD_RESEND_API_KEY }}" >> $GITHUB_ENV

      - name: Blue/Green Deploy — Backend
        run: |
          echo "🔵 Starting Blue/Green deployment..."
          echo "Current SHA: ${{ github.sha }}"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "DEPLOYMENT STRATEGY: Blue/Green Container Swap"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Step 1: Pull new image to 'green' slot"
          echo "  → docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:sha-${{ github.sha }}"
          echo ""
          echo "Step 2: Start green container (new version) on alternate port"
          echo "  → docker run -d --name tresk-backend-green --env-file .env.prod -p 5001:5000 tresk-backend:sha-${{ github.sha }}"
          echo ""
          echo "Step 3: Health-check green container"
          echo "  → curl -sf http://localhost:5001/health || exit 1"
          echo ""
          echo "Step 4: Swap Nginx upstream from blue to green"
          echo "  → nginx -s reload"
          echo ""
          echo "Step 5: Drain blue container (wait 30s for in-flight requests)"
          echo "  → sleep 30 && docker stop tresk-backend-blue"
          echo ""
          echo "✅ Blue/Green swap complete. Green is now production."
          echo ""
          echo "⚠️  CONFIGURE: Add your deployment commands above."
          echo "   For Railway: Use railway deploy --service backend"
          echo "   For Render:  Use Render deploy hooks"
          echo "   For VPS:     SSH and run docker-compose pull && docker-compose up -d"

      - name: Post-deployment health check
        run: |
          echo "🏥 Running post-deployment health checks..."
          # Uncomment when API URL is live:
          # curl -sf https://api.tresk.ai/health || (echo "❌ Health check failed!" && exit 1)
          echo "✅ Health check stub passed. Configure real URL when deployed."

      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 Deployment successful!"
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Timestamp: $(date -u)"
          # Optionally: Send Slack/Discord webhook notification here

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️  Deployment FAILED — initiating rollback!"
          echo "🔴 Restoring blue (previous stable) container as production..."
          echo "  → docker start tresk-backend-blue"
          echo "  → nginx -s reload"
          echo "Rollback complete. Blue container restored."
