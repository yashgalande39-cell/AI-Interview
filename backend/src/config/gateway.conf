# =============================================================================
# TRESK AI — Nginx API Gateway Configuration
# =============================================================================
# Handles: Rate limiting, CORS, CSP, SSL termination, tenant resolution,
#          upstream proxying to Node.js backends.
#
# Deploy: Place this file at /etc/nginx/conf.d/tresk-ai.conf
# Reload:  sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ─── Rate Limiting Zones ─────────────────────────────────────────────────────
# Keyed by IP — prevents abuse from single sources.
# For tenant-aware limiting, key by $http_x_tenant_id instead.

limit_req_zone $binary_remote_addr zone=api_global:10m     rate=60r/m;   # 60 req/min per IP (global)
limit_req_zone $binary_remote_addr zone=api_auth:10m       rate=10r/m;   # Auth endpoints: 10 req/min
limit_req_zone $binary_remote_addr zone=api_ai:10m         rate=20r/m;   # AI endpoints: 20 req/min
limit_req_zone $binary_remote_addr zone=api_upload:10m     rate=5r/m;    # Upload: 5 req/min
limit_req_zone $http_x_tenant_id   zone=tenant_api:20m     rate=300r/m;  # 300 req/min per tenant

# ─── Upstream: Node.js Backend ───────────────────────────────────────────────
upstream tresk_backend {
    least_conn;  # Least-connection load balancing (for multi-instance)
    server 127.0.0.1:5000 max_fails=3 fail_timeout=30s;
    # Add more instances for horizontal scaling:
    # server 127.0.0.1:5001 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:5002 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ─── HTTP → HTTPS Redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.tresk.ai;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main HTTPS Server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.tresk.ai;

    # ── SSL / TLS ─────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.tresk.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tresk.ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.tresk.ai/chain.pem;

    # Modern TLS config (based on Mozilla Intermediate compatibility)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ──────────────────────────────────────────────────────

    # HTTP Strict Transport Security (2 years, include subdomains)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Content Security Policy — tightened for API gateway
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy (disable camera/mic/geo at gateway level — app re-enables via JS)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Remove server version from headers
    server_tokens off;

    # ── CORS Handling ─────────────────────────────────────────────────────────
    # Handle preflight OPTIONS requests
    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Tenant-ID, X-Request-ID' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        # ── Tenant Resolution ──────────────────────────────────────────────
        # Pass tenant context to upstream. Resolved from subdomain or header.
        # Subdomain-based: tenantA.api.tresk.ai — use $host split logic here or in Lua.
        # Header-based (simpler): frontend sets X-Tenant-ID header.
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Unique request ID for tracing across microservices
        proxy_set_header X-Request-ID $request_id;
        add_header X-Request-ID $request_id always;

        # Global rate limit
        limit_req zone=api_global burst=20 nodelay;
        limit_req_status 429;

        # Proxy to Node.js backend
        proxy_pass http://tresk_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";  # Enable keepalive for upstream

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings for large AI responses
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
    }

    # ── Auth Endpoints — Stricter Rate Limits ────────────────────────────────
    location ~ ^/api/(auth|billing)/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_pass http://tresk_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── AI Inference Endpoints — Moderate Rate Limits ────────────────────────
    location ~ ^/api/(interviews|tresk|resumes|analytics)/ {
        limit_req zone=api_ai burst=10 nodelay;
        limit_req_status 429;

        proxy_set_header X-Tenant-ID $http_x_tenant_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_pass http://tresk_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Longer timeout for AI calls
        proxy_read_timeout 120s;
    }

    # ── File Upload Endpoints — Tightest Rate Limits ─────────────────────────
    location ~ ^/api/resumes/upload {
        limit_req zone=api_upload burst=2 nodelay;
        limit_req_status 429;

        # Max upload size: 10 MB
        client_max_body_size 10m;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_pass http://tresk_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ── Health check (no rate limit, no auth needed) ──────────────────────────
    location = /health {
        proxy_pass http://tresk_backend;
        access_log off;
    }

    # ── WebSocket Support (Socket.IO) ─────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://tresk_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;  # Keep WS connections alive for 1 hour
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~ /\. { deny all; }
    location ~ /\.git { deny all; }
    location ~ /node_modules/ { deny all; }
}
